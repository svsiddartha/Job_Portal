<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Job Portal System</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;

    align-items:flex-start;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1d4ed8
    );

    overflow-y:auto;

    overflow-x:hidden;

    position:relative;

    padding:40px 0;
}

/* Floating briefcases */

.briefcase{

    position:absolute;

    font-size:70px;

    color:rgba(255,255,255,0.08);

    animation:float 6s ease-in-out infinite;
}

.briefcase:nth-child(1){

    top:10%;
    left:8%;
}

.briefcase:nth-child(2){

    top:18%;
    right:10%;

    animation-delay:2s;
}

.briefcase:nth-child(3){

    bottom:10%;
    left:12%;

    animation-delay:4s;
}

.briefcase:nth-child(4){

    bottom:8%;
    right:8%;

    animation-delay:1s;
}

@keyframes float{

    0%{
        transform:translateY(0px)
                  rotate(0deg);
    }

    50%{
        transform:translateY(-20px)
                  rotate(5deg);
    }

    100%{
        transform:translateY(0px)
                  rotate(0deg);
    }
}

/* Main Container */

.container{

    width:90%;

    max-width:850px;

    padding:50px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0px 8px 40px rgba(0,0,0,0.4);

    text-align:center;

    color:white;

    animation:fadeIn 1.5s ease;

    margin-bottom:40px;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* Title */

.logo{

    font-size:50px;

    color:#60a5fa;

    margin-bottom:10px;
}

h1{

    font-size:55px;

    margin-bottom:10px;

    font-weight:700;
}

.subtitle{

    color:#cbd5e1;

    font-size:20px;

    margin-bottom:40px;
}

/* Modules */

.module{

    background:rgba(255,255,255,0.05);

    border-radius:20px;

    padding:30px;

    margin-bottom:30px;

    transition:0.3s ease;
}

.module:hover{

    transform:translateY(-5px);

    background:rgba(255,255,255,0.08);
}

.module h2{

    margin-bottom:25px;

    font-size:32px;

    color:#93c5fd;
}

/* Buttons */

a{

    display:inline-block;

    text-decoration:none;

    color:white;

    padding:14px 30px;

    margin:12px;

    border-radius:12px;

    font-size:17px;

    font-weight:500;

    transition:0.3s ease;

    box-shadow:
    0px 5px 20px rgba(0,0,0,0.3);
}

/* User Buttons */

.user-btn{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );
}

/* Recruiter Buttons */

.rec-btn{

    background:
    linear-gradient(
        135deg,
        #7c3aed,
        #a855f7
    );
}

/* Admin Button */

.admin-btn{

    background:
    linear-gradient(
        135deg,
        #f97316,
        #fb923c
    );
}

a:hover{

    transform:
    translateY(-5px)
    scale(1.05);

    box-shadow:
    0px 10px 30px rgba(0,0,0,0.4);
}

/* Footer */

.footer{

    margin-top:20px;

    color:#cbd5e1;

    font-size:15px;
}

.footer i{

    color:#60a5fa;
}

</style>

</head>

<body>

<!-- Floating Briefcases -->

<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>

<!-- Main Container -->

<div class="container">

<div class="logo">
<i class="fa-solid fa-briefcase"></i>
</div>

<h1>Job Portal System</h1>

<p class="subtitle">
Connecting Talent with Opportunities
</p>

<!-- User Module -->

<div class="module">

<h2>User Module</h2>

<a href="/registerPage"
class="user-btn">

<i class="fa-solid fa-user-plus"></i>
&nbsp;
User Register

</a>

<a href="/loginPage"
class="user-btn">

<i class="fa-solid fa-right-to-bracket"></i>
&nbsp;
User Login

</a>

</div>

<!-- Recruiter Module -->

<div class="module">

<h2>Recruiter Module</h2>

<a href="/recruiterRegisterPage"
class="rec-btn">

<i class="fa-solid fa-user-tie"></i>
&nbsp;
Recruiter Register

</a>

<a href="/recruiterLoginPage"
class="rec-btn">

<i class="fa-solid fa-building"></i>
&nbsp;
Recruiter Login

</a>

</div>

<!-- Admin Module -->

<div class="module">

<h2>Admin Module</h2>

<a href="/adminLoginPage"
class="admin-btn">

<i class="fa-solid fa-shield-halved"></i>
&nbsp;
Admin Login

</a>

</div>

<!-- Footer -->

<div class="footer">

<i class="fa-solid fa-users"></i>

© 2026 Job Portal System |
Spring Boot Project

</div>

</div>

</body>
</html>
