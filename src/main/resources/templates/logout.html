<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Logout</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1d4ed8
    );

    overflow:hidden;

    position:relative;
}

/* Floating briefcases */

.briefcase{

    position:absolute;

    font-size:70px;

    color:rgba(255,255,255,0.08);

    animation:float 6s ease-in-out infinite;
}

.briefcase:nth-child(1){

    top:10%;
    left:10%;
}

.briefcase:nth-child(2){

    top:15%;
    right:12%;

    animation-delay:2s;
}

.briefcase:nth-child(3){

    bottom:10%;
    left:12%;

    animation-delay:4s;
}

.briefcase:nth-child(4){

    bottom:8%;
    right:10%;

    animation-delay:1s;
}

@keyframes float{

    0%{
        transform:translateY(0px)
                  rotate(0deg);
    }

    50%{
        transform:translateY(-20px)
                  rotate(5deg);
    }

    100%{
        transform:translateY(0px)
                  rotate(0deg);
    }
}

/* Logout Card */

.container{

    width:500px;

    padding:50px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0px 8px 40px rgba(0,0,0,0.4);

    text-align:center;

    color:white;

    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

.icon{

    font-size:70px;

    color:#60a5fa;

    margin-bottom:20px;
}

h1{

    font-size:42px;

    margin-bottom:15px;
}

p{

    color:#cbd5e1;

    font-size:18px;

    margin-bottom:35px;
}

/* Buttons */

a{

    display:inline-block;

    text-decoration:none;

    color:white;

    padding:14px 30px;

    margin:10px;

    border-radius:12px;

    font-size:16px;

    font-weight:500;

    transition:0.3s ease;

    box-shadow:
    0px 5px 20px rgba(0,0,0,0.3);
}

.home-btn{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );
}

.login-btn{

    background:
    linear-gradient(
        135deg,
        #7c3aed,
        #a855f7
    );
}

a:hover{

    transform:
    translateY(-5px)
    scale(1.05);

    box-shadow:
    0px 10px 30px rgba(0,0,0,0.4);
}

.footer{

    margin-top:25px;

    font-size:14px;

    color:#cbd5e1;
}

</style>

</head>

<body>

<!-- Floating Icons -->

<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>

<!-- Logout Container -->

<div class="container">

<div class="icon">
<i class="fa-solid fa-right-from-bracket"></i>
</div>

<h1>Logged Out Successfully</h1>

<p>
Thank you for using Job Portal System.
See you again soon!
</p>

<a href="/"
class="home-btn">

<i class="fa-solid fa-house"></i>
&nbsp;
Home

</a>

<a href="/loginPage"
class="login-btn">

<i class="fa-solid fa-right-to-bracket"></i>
&nbsp;
Login Again

</a>

<div class="footer">

© 2026 Job Portal System

</div>

</div>

</body>
</html>
