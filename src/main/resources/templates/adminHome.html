<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1d4ed8
    );

    overflow:hidden;

    position:relative;
}

/* Floating Briefcases */

.briefcase{

    position:absolute;

    font-size:70px;

    color:rgba(255,255,255,0.08);

    animation:float 6s ease-in-out infinite;
}

.briefcase:nth-child(1){

    top:10%;
    left:10%;
}

.briefcase:nth-child(2){

    top:15%;
    right:12%;

    animation-delay:2s;
}

.briefcase:nth-child(3){

    bottom:10%;
    left:12%;

    animation-delay:4s;
}

.briefcase:nth-child(4){

    bottom:8%;
    right:10%;

    animation-delay:1s;
}

@keyframes float{

    0%{
        transform:translateY(0px)
                  rotate(0deg);
    }

    50%{
        transform:translateY(-20px)
                  rotate(5deg);
    }

    100%{
        transform:translateY(0px)
                  rotate(0deg);
    }
}

/* Dashboard Container */

.container{

    width:540px;

    padding:45px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0px 8px 40px rgba(0,0,0,0.4);

    text-align:center;

    color:white;

    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* Title */

.logo{

    font-size:60px;

    color:#fb923c;

    margin-bottom:15px;
}

h1{

    font-size:40px;

    margin-bottom:35px;
}

/* Dashboard Buttons */

a{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    text-decoration:none;

    color:white;

    padding:16px;

    margin:18px 0;

    border-radius:15px;

    font-size:18px;

    font-weight:500;

    transition:0.3s ease;

    box-shadow:
    0px 5px 20px rgba(0,0,0,0.3);
}

/* Different Colors */

.users{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );
}

.recruiters{

    background:
    linear-gradient(
        135deg,
        #7c3aed,
        #a855f7
    );
}

.jobs{

    background:
    linear-gradient(
        135deg,
        #059669,
        #10b981
    );
}

.applications{

    background:
    linear-gradient(
        135deg,
        #dc2626,
        #ef4444
    );
}

.logout{

    background:
    linear-gradient(
        135deg,
        #ea580c,
        #fb923c
    );
}

a:hover{

    transform:
    translateY(-5px)
    scale(1.03);

    box-shadow:
    0px 10px 30px rgba(0,0,0,0.4);
}

/* Footer */

.footer{

    margin-top:30px;

    color:#d1d5db;

    font-size:15px;
}

</style>

</head>

<body>

<!-- Floating Briefcases -->

<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>

<!-- Dashboard -->

<div class="container">

<div class="logo">
<i class="fa-solid fa-shield-halved"></i>
</div>

<h1>Admin Dashboard</h1>

<a href="/viewUsers"
class="users">

<i class="fa-solid fa-users"></i>

View Users

</a>

<a href="/viewRecruiters"
class="recruiters">

<i class="fa-solid fa-user-tie"></i>

View Recruiters

</a>

<a href="/viewJobs"
class="jobs">

<i class="fa-solid fa-briefcase"></i>

View Jobs

</a>

<a href="/viewApplicationsAdmin"
class="applications">

<i class="fa-solid fa-file-circle-check"></i>

View Applications

</a>

<a href="/logout"
class="logout">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

<div class="footer">

© 2026 Job Portal System | Admin Panel

</div>

</div>

</body>
</html>
