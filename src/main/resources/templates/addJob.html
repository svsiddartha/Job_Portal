<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Job</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1d4ed8
    );

    position:relative;

    padding:40px 20px;

    overflow-y:auto;
}

/* Floating Briefcases */

.briefcase{

    position:absolute;

    font-size:70px;

    color:rgba(255,255,255,0.06);

    animation:float 6s ease-in-out infinite;
}

.briefcase:nth-child(1){

    top:10%;
    left:10%;
}

.briefcase:nth-child(2){

    top:15%;
    right:12%;

    animation-delay:2s;
}

.briefcase:nth-child(3){

    bottom:10%;
    left:12%;

    animation-delay:4s;
}

.briefcase:nth-child(4){

    bottom:8%;
    right:10%;

    animation-delay:1s;
}

@keyframes float{

    0%{
        transform:translateY(0px)
                  rotate(0deg);
    }

    50%{
        transform:translateY(-20px)
                  rotate(5deg);
    }

    100%{
        transform:translateY(0px)
                  rotate(0deg);
    }
}

/* Main Form Container */

.container{

    width:600px;

    padding:45px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0px 8px 40px rgba(0,0,0,0.4);

    color:white;

    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* Heading */

.title{

    text-align:center;

    margin-bottom:35px;
}

.title i{

    font-size:60px;

    color:#10b981;

    margin-bottom:15px;
}

.title h1{

    font-size:42px;
}

/* Form */

form{

    display:flex;

    flex-direction:column;

    gap:20px;
}

.input-box{

    display:flex;

    flex-direction:column;
}

label{

    margin-bottom:8px;

    font-size:16px;

    font-weight:500;
}

input,
textarea{

    padding:14px;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.12);

    color:white;

    font-size:15px;

    transition:0.3s ease;
}

input:focus,
textarea:focus{

    background:rgba(255,255,255,0.18);

    box-shadow:
    0px 0px 10px rgba(59,130,246,0.6);
}

textarea{

    resize:none;

    height:120px;
}

input::placeholder,
textarea::placeholder{

    color:#d1d5db;
}

/* Button */

button{

    margin-top:10px;

    padding:15px;

    border:none;

    border-radius:14px;

    font-size:17px;

    font-weight:600;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
        135deg,
        #059669,
        #10b981
    );

    transition:0.3s ease;
}

button:hover{

    transform:
    translateY(-5px)
    scale(1.02);

    box-shadow:
    0px 10px 30px rgba(16,185,129,0.5);
}

/* Back Button */

.back{

    text-align:center;

    margin-top:25px;
}

.back a{

    text-decoration:none;

    color:#cbd5e1;

    font-size:15px;

    transition:0.3s ease;
}

.back a:hover{

    color:white;
}

</style>

</head>

<body>

<!-- Floating Briefcases -->

<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>

<!-- Main Container -->

<div class="container">

<div class="title">

<i class="fa-solid fa-suitcase"></i>

<h1>Add Job</h1>

</div>

<form action="/addJob"
      method="post">

<div class="input-box">

<label>
<i class="fa-solid fa-briefcase"></i>
&nbsp;
Job Title
</label>

<input type="text"
       name="title"
       placeholder="Enter Job Title"
       required>

</div>

<div class="input-box">

<label>
<i class="fa-solid fa-building"></i>
&nbsp;
Company Name
</label>

<input type="text"
       name="company"
       placeholder="Enter Company Name"
       required>

</div>

<div class="input-box">

<label>
<i class="fa-solid fa-location-dot"></i>
&nbsp;
Location
</label>

<input type="text"
       name="location"
       placeholder="Enter Job Location"
       required>

</div>

<div class="input-box">

<label>
<i class="fa-solid fa-money-bill-wave"></i>
&nbsp;
Salary
</label>

<input type="text"
       name="salary"
       placeholder="Enter Salary Package"
       required>

</div>

<div class="input-box">

<label>
<i class="fa-solid fa-file-lines"></i>
&nbsp;
Job Description
</label>

<textarea name="description"
placeholder="Enter Job Description"
required></textarea>

</div>

<button type="submit">

<i class="fa-solid fa-plus"></i>
&nbsp;
Add Job

</button>

</form>

<div class="back">

<a href="/recruiterHome">

<i class="fa-solid fa-arrow-left"></i>
&nbsp;
Back to Dashboard

</a>

</div>

</div>

</body>
</html>
