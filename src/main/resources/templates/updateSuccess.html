<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile Updated</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1d4ed8
    );

    overflow:hidden;

    position:relative;
}

/* Floating Briefcases */

.briefcase{

    position:absolute;

    font-size:70px;

    color:rgba(255,255,255,0.06);

    animation:float 6s ease-in-out infinite;
}

.briefcase:nth-child(1){

    top:10%;
    left:10%;
}

.briefcase:nth-child(2){

    top:15%;
    right:12%;

    animation-delay:2s;
}

.briefcase:nth-child(3){

    bottom:10%;
    left:12%;

    animation-delay:4s;
}

.briefcase:nth-child(4){

    bottom:8%;
    right:10%;

    animation-delay:1s;
}

@keyframes float{

    0%{
        transform:translateY(0px)
                  rotate(0deg);
    }

    50%{
        transform:translateY(-20px)
                  rotate(5deg);
    }

    100%{
        transform:translateY(0px)
                  rotate(0deg);
    }
}

/* Success Container */

.container{

    width:550px;

    padding:50px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0px 8px 40px rgba(0,0,0,0.4);

    text-align:center;

    color:white;

    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* Icon */

.success-icon{

    width:110px;
    height:110px;

    margin:auto;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );

    box-shadow:
    0px 0px 30px rgba(59,130,246,0.6);

    animation:pop 1s ease;
}

.success-icon i{

    font-size:55px;
}

@keyframes pop{

    0%{
        transform:scale(0);
    }

    70%{
        transform:scale(1.1);
    }

    100%{
        transform:scale(1);
    }
}

/* Text */

h1{

    margin-top:30px;

    font-size:38px;
}

p{

    margin-top:15px;

    font-size:18px;

    color:#d1d5db;

    line-height:1.7;
}

/* Buttons */

.buttons{

    margin-top:35px;

    display:flex;

    justify-content:center;

    gap:20px;
}

.buttons a{

    text-decoration:none;

    color:white;

    padding:14px 28px;

    border-radius:12px;

    font-size:16px;

    font-weight:600;

    transition:0.3s ease;
}

.dashboard{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );
}

.profile{

    background:
    linear-gradient(
        135deg,
        #7c3aed,
        #a855f7
    );
}

.buttons a:hover{

    transform:
    translateY(-5px)
    scale(1.05);

    box-shadow:
    0px 10px 25px rgba(0,0,0,0.4);
}

/* Footer */

.footer{

    margin-top:35px;

    font-size:14px;

    color:#cbd5e1;
}

</style>

</head>

<body>

<!-- Floating Briefcases -->

<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>

<!-- Main Container -->

<div class="container">

<div class="success-icon">

<i class="fa-solid fa-user-check"></i>

</div>

<h1>Profile Updated!</h1>

<p>

Your profile information has been updated successfully 🎉

Your latest details are now saved in the Job Portal System.

</p>

<div class="buttons">

<a href="/userHome"
class="dashboard">

<i class="fa-solid fa-house"></i>
&nbsp;
Dashboard

</a>

<a href="/UpdateUser"
class="profile">

<i class="fa-solid fa-user-pen"></i>
&nbsp;
Edit Again

</a>

</div>

<div class="footer">

© 2026 Job Portal System

</div>

</div>

</body>
</html>
