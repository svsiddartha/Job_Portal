<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Registration</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1d4ed8
    );

    overflow:hidden;

    position:relative;
}

/* Floating Briefcases */

.briefcase{

    position:absolute;

    font-size:70px;

    color:rgba(255,255,255,0.08);

    animation:float 6s ease-in-out infinite;
}

.briefcase:nth-child(1){

    top:10%;
    left:10%;
}

.briefcase:nth-child(2){

    top:15%;
    right:12%;

    animation-delay:2s;
}

.briefcase:nth-child(3){

    bottom:10%;
    left:12%;

    animation-delay:4s;
}

.briefcase:nth-child(4){

    bottom:8%;
    right:10%;

    animation-delay:1s;
}

@keyframes float{

    0%{
        transform:translateY(0px)
                  rotate(0deg);
    }

    50%{
        transform:translateY(-20px)
                  rotate(5deg);
    }

    100%{
        transform:translateY(0px)
                  rotate(0deg);
    }
}

/* Registration Container */

.container{

    width:500px;

    padding:45px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0px 8px 40px rgba(0,0,0,0.4);

    text-align:center;

    color:white;

    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* Title */

.logo{

    font-size:60px;

    color:#60a5fa;

    margin-bottom:15px;
}

h1{

    font-size:40px;

    margin-bottom:30px;
}

/* Form */

.input-box{

    position:relative;

    margin-bottom:25px;
}

.input-box i{

    position:absolute;

    top:15px;
    left:15px;

    color:#93c5fd;

    font-size:18px;
}

input{

    width:100%;

    padding:15px 15px 15px 45px;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.1);

    color:white;

    font-size:15px;

    transition:0.3s ease;
}

input::placeholder{

    color:#cbd5e1;
}

input:focus{

    background:rgba(255,255,255,0.15);

    box-shadow:
    0px 0px 10px rgba(96,165,250,0.5);
}

/* Button */

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );

    color:white;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s ease;

    margin-top:10px;
}

button:hover{

    transform:
    translateY(-5px)
    scale(1.02);

    box-shadow:
    0px 10px 30px rgba(37,99,235,0.5);
}

/* Login Link */

.login-link{

    margin-top:25px;

    color:#cbd5e1;
}

.login-link a{

    color:#60a5fa;

    text-decoration:none;

    font-weight:600;
}

.login-link a:hover{

    text-decoration:underline;
}

</style>

</head>

<body>

<!-- Floating Briefcases -->

<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>
<i class="fa-solid fa-briefcase briefcase"></i>

<!-- Registration Form -->

<div class="container">

<div class="logo">
<i class="fa-solid fa-user-plus"></i>
</div>

<h1>User Registration</h1>

<form action="/register" method="post">

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input type="text"
name="uname"
placeholder="Enter Your Name"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-phone"></i>

<input type="text"
name="uphno"
placeholder="Enter Phone Number"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input type="email"
name="uemail"
placeholder="Enter Email"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input type="password"
name="upassword"
placeholder="Enter Password"
required>

</div>

<button type="submit">

<i class="fa-solid fa-user-check"></i>
&nbsp;
Register

</button>

</form>

<div class="login-link">

Already Registered?

<a href="/loginPage">

Login

</a>

</div>

</div>

</body>
</html>
